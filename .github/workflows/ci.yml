name: CI Pipeline

on:
  push:
    branches: [develop,main, master]
  pull_request:
    branches: [develop,main, master]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Build: compila o projeto e valida dependências
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compile
        run: mvn compile test-compile -B -q

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy (mock): simula o pipeline de entrega
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Prepare environment
        run: |
          echo "Preparing staging environment..."
          sleep 1
          echo "Environment ready."

      - name: Deploy artifact
        run: |
          echo "Deploying artifact to staging..."
          sleep 1
          echo "Artifact deployed successfully."

      - name: Health check
        run: |
          echo "Running health check..."
          sleep 1
          echo "Application is up and running at https://dummyjson.com"

  # ─────────────────────────────────────────────
  # JOB 3 — Test: executa os testes e publica o relatório
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn test -B

      - name: Generate Allure report
        if: always()
        run: mvn allure:report -B -q

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 7
